scraper:
  page_size: 25          # LinkedIn returns max 25 per page
  max_pages: 4           # 4 pages = 100 jobs max
  request_timeout: 30
  delay_between_requests: 3.0

categories:
  - name: "IT"
    keywords: "software engineer"
    ntfy_topic: "mine29-it-jobs-xyz123"
    location: "Singapore"
    experience_level: ""  # empty = all levels. Options: internship, entry, associate, mid-senior, director, executive

  - name: "Marketing"
    keywords: "marketing"
    ntfy_topic: "mine29-mkt-jobs-xyz123"
    location: "Singapore"
    experience_level: ""

notifications:
  ntfy_server: "https://ntfy.sh"
  ntfy_token: ""         # leave empty for public topics
  priority: "default"
  batch_size: 10

database:
  path: "/data/jobs.db"
  retention_days: 90

ai:
  enabled: false
  api_key: ""            # or set AI_API_KEY env var
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: "qwen-plus"
  request_timeout: 30

logging:
  level: "INFO"
